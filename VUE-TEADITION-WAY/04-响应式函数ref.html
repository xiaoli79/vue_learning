<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app">
        <p>{{msg}}</p>
        <p>{{obj.name}} + {{obj.age}}</p>
        <button @click = "onClick">修改ref数据</button>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        // ref函数既可以接受基本类型,也可以接受引用类型
        //解构出createApp,ref函数
        const {createApp,ref} = Vue

        createApp({
            setup(){
                //ref定义一个响应式字符串
                const msg = ref("Hello Vue3")
                //ref定义一个响应式对象
                const obj = ref({
                    name:"小Vue3",
                    age:9
                })
                // 点击事件
                const onClick = () =>{
                    //修改msg
                    msg.value = "你好,Vue3"

                    //使用ref定义的数据,在js操作中,需要.value,在标签中,则不需要.value
                    // 修改obj的name和age属性
                    msg.value.name = 'Vue3'
                    obj.value.age = 10
                }
                return{
                    msg,
                    obj,
                    onClick
                }
            }
        }).mount('#app')

    </script>



</body>
</html>
