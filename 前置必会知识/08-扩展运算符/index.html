<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        //1.复制数组
        const arr1 = [1, 2, 3];
        const arr2 = [...arr1]; // 使用扩展运算符复制数组
        //1.扩展运算符
        console.log(arr2); // 输出: [1, 2, 3]
        

        //2.复制对象
        const obj1 = { a: 1, b: 2 };
        const obj2 = { ...obj1 }; // 使用扩展运算符复制对象
        console.log(obj2); // 输出: { a: 1, b: 2


        //3.合并数组
        const arr3 = [1, 2, 3];
        const arr4 = [4, 5, 6];
        const combinedArr = [...arr3, ...arr4]; // 使用扩展运算符合并数组
        console.log(combinedArr); // 输出: [1, 2, 3, 4, 5, 6]    


        //4.合并对象
        const obj3 = { a: 1, b: 2 };
        const obj4 = { c: 3, d: 4 };
        const combinedObj = { ...obj3, ...obj4 }; // 使用扩展运算符合并对象
        console.log(combinedObj); // 输出: { a: 1, b: 2, c: 3, d: 4 }
    </script>   
    
</body>
</html>
