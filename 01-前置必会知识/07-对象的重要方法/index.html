    <script>
        const obj = {
            id:10001,
            name:"xiaoli",
            age:9,
            address:"beijing"

        // 现在遍历对象: Object.keys() + filter + foreach



        Object.key(obj).filter((key) => key.startsWith('a'))
        .forEach(key => {
            console.log(obj[key])
        });

    </script>
